
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BOOM_B</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:black;
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }

    .overlay{
      position:absolute;
      width:100%;
      height:100%;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:10;
      transition:1s;
    }

    .enter-btn{
      padding:16px 45px;
      border-radius:15px;
      border:1px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.05);
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:.3s;
    }

    .enter-btn:hover{
      transform:scale(1.08);
      background:white;
      color:black;
      box-shadow:0 0 30px white;
    }

    .content{
      opacity:0;
      transition:1s;
      text-align:center;
    }

    .show{
      opacity:1;
    }

    h1{
      font-size:60px;
      letter-spacing:5px;
    }

    p{
      color:#888;
      margin-top:10px;
    }

    .glow{
      position:absolute;
      width:450px;
      height:450px;
      background:white;
      opacity:.08;
      filter:blur(180px);
      border-radius:50%;
    }
  </style>
</head>
<body>

<div class="glow"></div>

<!-- เพลง -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<!-- หน้าเปิด -->
<div class="overlay" id="overlay">
  <button class="enter-btn" onclick="enterSite()">
    CLICK TO ENTER
  </button>
</div>

<!-- เนื้อหา -->
<div class="content" id="content">
  <h1>BOOM_B</h1>
  <p>Welcome to my bio</p>
</div>

<script>
  function enterSite(){

    // เล่นเพลง
    document.getElementById("music").play();

    // ซ่อนหน้าเปิด
    document.getElementById("overlay").style.opacity = "0";

    setTimeout(() => {
      document.getElementById("overlay").style.display = "none";
      document.getElementById("content").classList.add("show");
    },1000);
  }
</script>

</body>
</html>
